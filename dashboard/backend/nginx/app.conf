
upstream fastapi_app {
    server api:8000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _; # Listen on all hostnames

    # Basic logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location /ws {
        proxy_pass http://fastapi_app;

        # --- Essential WebSocket Headers ---
        proxy_http_version 1.1; # Required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade; # Pass Upgrade header from client
        proxy_set_header Connection $connection_upgrade; # Use the map variable defined above

        # --- Recommended General Proxy Headers ---
        proxy_set_header Host $host; # Pass original host header
        proxy_cache_bypass $http_upgrade; # Don't cache WebSocket upgrades
        proxy_set_header X-Real-IP $remote_addr; # Forward client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Forward proxy chain IPs
        proxy_set_header X-Forwarded-Proto $scheme; # Forward protocol (http/https)

        # --- Optional: Timeouts (increase if needed for long connections) ---
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # --- Optional: Disable buffering (sometimes helps real-time) ---
        proxy_buffering off;
    }

    location / {

        proxy_pass http://fastapi_app; # Route to the fastapi upstream

        proxy_http_version 1.1;
        # Headers needed for general proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_set_header Connection ""; # Uncomment if issues with keep-alive
    }
}
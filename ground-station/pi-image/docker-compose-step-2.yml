version: '3.6'

services:
    custompios:
        image: ghcr.io/guysoft/custompios:devel
        container_name: mydistro-build
        tty: true
        restart: always
        privileged: true
        volumes:
        # change the path to the name of your distro
        - ./UMBGroundStation/src/:/distro
        devices:
        - /dev/loop-control
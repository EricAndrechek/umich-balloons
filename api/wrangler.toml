name = "umich-balloons-api"
main = "src/index.ts"
compatibility_date = "2026-04-05"
workers_dev = false

[build]
command = "printf 'export const COMMIT_SHA = \"%.7s\";\\n' \"${WORKERS_CI_COMMIT_SHA:-dev}\" > src/version.ts"

[[routes]]
pattern = "api.umich-balloons.com"
custom_domain = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

[vars]
SONDEHUB_API_URL = "https://api.v2.sondehub.org"
SOFTWARE_NAME = "umich-balloons"
DEV_MODE = "false"

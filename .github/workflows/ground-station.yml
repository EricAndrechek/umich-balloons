name: Ground Station Build

on:
  push:
    branches: [main]
    paths:
      - 'ground-station/umbgs/**'
      - '.github/workflows/ground-station.yml'
  pull_request:
    paths:
      - 'ground-station/umbgs/**'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ground-station/umbgs

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: ground-station/umbgs/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build (linux/arm64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          go build -ldflags="-s -w -X main.version=${VERSION}" -o ../../umbgs-linux-arm64 ./cmd/umbgs

      - name: Calculate SHA256
        run: |
          cd ../..
          sha256sum umbgs-linux-arm64 > umbgs-linux-arm64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: umbgs-linux-arm64
          path: |
            umbgs-linux-arm64
            umbgs-linux-arm64.sha256

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: umbgs-linux-arm64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            umbgs-linux-arm64
            umbgs-linux-arm64.sha256

  image:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: umbgs-linux-arm64

      - name: Install packer-builder-arm
        run: |
          docker pull mkaczanowski/packer-builder-arm:latest

      - name: Build Pi image
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          chmod +x umbgs-linux-arm64
          docker run --rm --privileged \
            -v /dev:/dev \
            -v $(pwd):/build \
            mkaczanowski/packer-builder-arm:latest \
            build \
            -var "umbgs_version=${VERSION}" \
            /build/ground-station/packer/ground-station.json

      - name: Upload image to release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.img.gz
